version: '3.8'

services:
  # MongoDB - Database for all services
  mongodb:
    image: mongo:7.0
    container_name: microservices-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: admin
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - microservices-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: microservices-rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Distributed Locking
  redis:
    image: redis:7-alpine
    container_name: microservices-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build:
      context: ./user
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGO_URI: mongodb://admin:password@mongodb:27017/userdb?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: user_service_secret_key_2024
      SERVICE_TOKEN: user-service-token
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

  # Driver Service
  driver-service:
    build:
      context: ./Driver
      dockerfile: Dockerfile
    container_name: driver-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGO_URI: mongodb://admin:password@mongodb:27017/captaindb?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: driver_service_secret_key_2024
      SERVICE_TOKEN: driver-service-token
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

  # Ride Service
  ride-service:
    build:
      context: ./ride
      dockerfile: Dockerfile
    container_name: ride-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      MONGO_URI: mongodb://admin:password@mongodb:27017/ridedb?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ride_service_secret_key_2024
      SERVICE_TOKEN: ride-service-token
      USER_SERVICE_URL: http://user-service:3001
      DRIVER_SERVICE_URL: http://driver-service:3002
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

volumes:
  mongodb_data:
  rabbitmq_data:
  redis_data:

networks:
  microservices-network:
    driver: bridge
